    <circle cx="-20" cy="-10" r="3" fill="#28A745" opacity="0.9"/>
    <circle cx="20" cy="-10" r="3" fill="#28A745" opacity="0.9"/>
    <circle cx="-15" cy="15" r="2.5" fill="#FFC107" opacity="0.8"/>
