    <!-- Left hemisphere -->
    <path d="M -35 -20 Q -45 -10 -45 5 Q -45 20 -35 28 Q -25 35 -10 35 L -10 -30 Q -25 -30 -35 -20" fill="#0D6EFD" opacity="0.8"/>
    
